<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>OpenDocs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<style>

body{

background:#f5f7fb;

}

.sidebar{

background:#07122b;

min-height:100vh;

}

.sidebar .nav-link{

color:#cbd5e1;

padding:12px 15px;

border-radius:10px;

margin-bottom:8px;

}

.sidebar .nav-link:hover{

background:#152348;

color:white;

}

.sidebar .nav-link.active{

background:#2563eb;

color:white;

}

.content{

padding:35px;

}

.stats-card{

border:none;

border-radius:16px;

box-shadow:0 3px 12px rgba(0,0,0,.05);

}

</style>

</head>


<body>


<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar p-4">

<h4 class="text-white fw-bold mb-5">

OpenDocs

</h4>


<ul class="nav flex-column">


<li class="nav-item">

<a class="nav-link active"

href="{% url 'dashboard' %}">

<i class="bi bi-grid me-2"></i>

Dashboard

</a>

</li>


<li>

<a class="nav-link"

href="{% url 'company' %}"


<i class="bi bi-building me-2"></i>

Company

</a>

</li>


<li>

<a class="nav-link"

href="#">

<i class="bi bi-file-earmark-text me-2"></i>

Documents

</a>

</li>


<li>

<a class="nav-link"

href="#">

<i class="bi bi-palette me-2"></i>

Templates

</a>

</li>


<li>

<a class="nav-link"

<a class="nav-link"

href="#">

<i class="bi bi-gear me-2"></i>

Settings

</a>

</li>

</ul>

</div>



<!-- CONTENT -->

<div class="col-md-10">

<div class="content">
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% block dashboard_content %}

{% endblock %}

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
